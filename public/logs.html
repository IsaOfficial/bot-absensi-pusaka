<!doctype html>
<html>
  <head>
    <title>Logs</title>
    <script>
      setInterval(loadLogs, 2000);
    </script>
  </head>
  <body>
    <h2>📊 Logs</h2>
    <button onclick="loadLogs()">Refresh</button>
    <hr />
    <table border="1">
      <thead>
        <tr>
          <th>Waktu</th>
          <th>User</th>
          <th>Type</th>
          <th>Status</th>
          <th>Message</th>
        </tr>
      </thead>
      <tbody id="logs"></tbody>
    </table>

    <script>
      let lastData = "";
      async function loadLogs() {
        try {
          const res = await fetch("/logs");
          const data = await res.json();

          const tbody = document.getElementById("logs-body");
          tbody.innerHTML = "";

          data.forEach((log) => {
            const date = new Date(log.created_at + "Z").toLocaleString("id-ID");

            tbody.innerHTML += `
        <tr>
          <td>${date}</td>
          <td>${log.username}</td>
          <td>${log.type}</td>
          <td>${log.status}</td>
          <td>${log.message}</td>
        </tr>
      `;
          });
        } catch (err) {
          console.log("❌ Gagal load logs:", err);
        }
      }
    </script>
  </body>
</html>
