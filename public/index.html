<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Bot Absensi Pusaka</title>

    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <div class="container">
      <h1>🤖 Bot Absensi Pusaka</h1>

      <div class="status-card">
        <h2>Status Scheduler</h2>

        <div id="scheduler-status" class="status offline">🔴 STOPPED</div>
      </div>

      <div class="action-group">
        <button id="start-btn">▶ Start Scheduler</button>

        <button id="stop-btn" class="danger">■ Stop Scheduler</button>
      </div>

      <div class="health-grid">
        <div class="card">
          <h3>Queue</h3>

          <p id="queue-status">-</p>
        </div>

        <div class="card">
          <h3>Browser</h3>

          <p id="browser-status">-</p>
        </div>

        <div class="card">
          <h3>Memory</h3>

          <p id="memory-status">-</p>
        </div>

        <div class="card">
          <h3>Uptime</h3>

          <p id="uptime-status">-</p>
        </div>
      </div>
        
        <div class="footer-link">
          <a href="/users.html"> 👥 User Management </a> ||
          <a href="/logs.html">📄 Lihat Logs</a>
        </div>
      </div>
    </div>

    <script type="module" src="/js/dashboard.js"></script>
  </body>
</html>
