<!doctype html>
<html>
  <head>
    <title>Admin Dashboard</title>
  </head>
  <body>
    <h2>🤖 Attendance Bot Control</h2>

    <button onclick="startBot()">Start</button>
    <button onclick="stopBot()">Stop</button>
    <!-- <button onclick="checkStatus()">Status</button> -->

    <p id="status"></p>

    <hr />

    <h2>👤 Users</h2>

    <form onsubmit="addUser(event)">
      <input placeholder="username" id="username" required />
      <input placeholder="password" id="password" required />
      <input placeholder="lat" id="lat" value="-6.62949867534904" required />
      <input placeholder="lng" id="lng" value="110.72249001053517" required />
      <button>Add</button>
    </form>

    <ul id="users"></ul>

    <hr />

    <a href="/logs.html">📊 Lihat Logs</a>

    <script>
      async function loadUsers() {
        const res = await fetch("/api/users");
        const users = await res.json();

        const ul = document.getElementById("users");
        ul.innerHTML = "";

        users.forEach((u) => {
          const li = document.createElement("li");
          li.innerHTML = `
          ${u.username}
          <button onclick="deleteUser(${u.id})">❌</button>
        `;
          ul.appendChild(li);
        });
      }

      async function addUser(e) {
        e.preventDefault();

        await fetch("/api/users", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            username: username.value,
            password: password.value,
            latitude: parseFloat(lat.value),
            longitude: parseFloat(lng.value),
            masuk: "06:05",
            pulang: "14:35",
            jumat: "11:35",
            sabtu: "15:05",
          }),
        });

        loadUsers();
      }

      async function deleteUser(id) {
        await fetch("/api/users/" + id, { method: "DELETE" });
        loadUsers();
      }

      async function startBot() {
        await fetch("/start");
        checkStatus();
      }

      async function stopBot() {
        await fetch("/stop");
        checkStatus();
      }

      async function checkStatus() {
        const res = await fetch("/status");
        const data = await res.json();
        document.getElementById("status").innerText = data.scheduler
          ? "🟢 RUNNING"
          : "🔴 STOPPED";
      }

      loadUsers();
      checkStatus();
    </script>
  </body>
</html>
